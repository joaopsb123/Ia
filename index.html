<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
import {
  getAuth,
  signInWithRedirect,
  getRedirectResult,
  GoogleAuthProvider,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// =========================
// FIREBASE CONFIG
// =========================
const firebaseConfig = {
  apiKey: "AIzaSyCrJ47i72d-rPtvOnXc84o0Enp0zkpYv_4",
  authDomain: "ia-123-a8ea8.firebaseapp.com",
  projectId: "ia-123-a8ea8",
  storageBucket: "ia-123-a8ea8.firebasestorage.app",
  messagingSenderId: "232554388490",
  appId: "1:232554388490:web:2ad57cab51484837f593f3",
  measurementId: "G-2PM2X2JVGT"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const db = getFirestore(app);

const errDiv = document.getElementById('login-error');

// =========================
// GOOGLE REDIRECT CHECK
// =========================
getRedirectResult(auth).catch((error) => {
  errDiv.innerHTML = `❌ Erro Google:<br>${error.code}`;
  errDiv.style.display = 'block';
});

// =========================
// OBSERVADOR DE LOGIN
// =========================
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('login-screen').classList.remove('active-screen');
    document.getElementById('tab-chat').classList.add('active-screen');

    const nome = user.displayName || user.email.split('@')[0];
    document.getElementById('user-name').innerText = nome;
    document.getElementById('user-avatar').innerText = nome.charAt(0).toUpperCase();
  } else {
    window.switchTab('login');
  }
});

// =========================
// LOGIN EMAIL / REGISTO AUTO
// =========================
document.getElementById('btn-login-email').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('password').value.trim();

  if (!email || !pwd) {
    errDiv.innerHTML = "⚠️ Escreve um email e uma palavra-passe!";
    errDiv.style.display = 'block';
    return;
  }

  errDiv.style.display = 'none';
  const btn = document.getElementById('btn-login-email');
  btn.innerText = "A carregar...";

  try {
    await signInWithEmailAndPassword(auth, email, pwd);
  } catch (error) {
    if (
      error.code === 'auth/user-not-found' ||
      error.code === 'auth/invalid-credential' ||
      error.code === 'auth/invalid-login-credentials'
    ) {
      try {
        await createUserWithEmailAndPassword(auth, email, pwd);
      } catch (errRegisto) {
        errDiv.innerHTML = `❌ Erro ao registar:<br>${errRegisto.code}`;
        errDiv.style.display = 'block';
      }
    } else {
      errDiv.innerHTML = `❌ Erro de login:<br>${error.code}`;
      errDiv.style.display = 'block';
    }
  }

  btn.innerText = "Entrar / Registar";
};

// =========================
// LOGIN GOOGLE
// =========================
document.getElementById('btn-login-google').onclick = async () => {
  errDiv.style.display = 'none';

  const btn = document.getElementById('btn-login-google');
  btn.innerText = "A redirecionar...";

  const provider = new GoogleAuthProvider();

  try {
    await signInWithRedirect(auth, provider);
  } catch (error) {
    errDiv.innerHTML = `❌ Erro ao abrir Google:<br>${error.code}`;
    errDiv.style.display = 'block';
    btn.innerText = "Google (Login Seguro)";
  }
};

// =========================
// LOGOUT
// =========================
document.getElementById('btn-logout').onclick = () => signOut(auth);

// =========================
// ENSINAR IA
// =========================
document.getElementById('btn-save-teach').onclick = async () => {
  const t = document.getElementById('teach-trigger').value;
  const r = document.getElementById('teach-response').value;

  if (!t || !r) {
    alert("Preenche todos os campos!");
    return;
  }

  try {
    await addDoc(collection(db, "ia_brain"), {
      trigger: t,
      response: r
    });

    alert("✅ Memória Guardada!");
  } catch (e) {
    alert("❌ Erro ao guardar!");
    console.error(e);
  }
};
        </script>
