<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha IA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
background:radial-gradient(circle at top,#161616,#0a0a0a);
color:#ececec;
height:100vh;
display:flex;
overflow:hidden;
}

/* LAYOUT */
.app{display:flex;width:100%;height:100%}

/* SIDEBAR */
.sidebar{
width:260px;
background:#121212;
border-right:1px solid #2a2a2a;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.logo{font-size:22px;font-weight:600}
.status{font-size:13px;color:#4ade80}

.side-btn{
background:#1f1f1f;
border:1px solid #333;
padding:10px;
border-radius:10px;
cursor:pointer;
transition:.2s;
font-size:14px;
}
.side-btn:hover{background:#2a2a2a;transform:translateX(3px)}

.counter{font-size:12px;color:#888;margin-top:auto}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100%}

/* CHAT */
.chat{
flex:1;
padding:24px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:14px;
scroll-behavior:smooth;
}

.msg{
max-width:75%;
padding:13px 17px;
border-radius:18px;
line-height:1.5;
white-space:pre-wrap;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1;transform:translateY(0)}
}

.user-msg{
align-self:flex-end;
background:#4285f4;
color:white;
border-bottom-right-radius:6px;
}

.bot-msg{
align-self:flex-start;
background:#1f1f1f;
border-bottom-left-radius:6px;
}

/* CODE BLOCK */
.code-block{
background:#0d0d0d;
border:1px solid #333;
border-radius:12px;
margin-top:10px;
overflow:hidden;
}

.code-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px 10px;
background:#151515;
font-size:12px;
color:#aaa;
}

.copy-btn{
background:#2a2a2a;
border:none;
color:white;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.copy-btn:hover{background:#3a3a3a}

pre{
margin:0;
padding:12px;
overflow:auto;
font-size:13px;
}

/* TYPING */
.typing{
display:flex;
gap:6px;
padding:10px 14px;
background:#1f1f1f;
border-radius:14px;
width:fit-content;
}

.dot{
width:6px;height:6px;background:#aaa;border-radius:50%;
animation:blink 1.4s infinite;
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:.3}
40%{opacity:1}
}

/* INPUT */
.input-wrap{padding:18px;border-top:1px solid #2a2a2a}

.input-box{
background:#1a1a1a;
border:1px solid #333;
border-radius:30px;
padding:10px 16px;
display:flex;
gap:10px;
}

.input-box input{
flex:1;background:transparent;border:none;color:white;
outline:none;font-size:16px;
}

.send{
width:44px;height:44px;border-radius:50%;
border:none;background:white;cursor:pointer;
font-weight:bold;transition:.15s;
}

.send:disabled{opacity:.5;cursor:not-allowed}
.send:hover:not(:disabled){
background:#34A853;color:white;transform:scale(1.05)
}

@media(max-width:768px){
.sidebar{display:none}
.msg{max-width:90%}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">🤖 Minha IA</div>
<div class="status">● Online</div>

<button class="side-btn" onclick="clearChat()">🧹 Limpar chat</button>
<button class="side-btn" onclick="resetMemory()">🧠 Reset memória</button>

<div class="counter" id="counter">Mensagens: 0</div>
</div>

<div class="main">

<div id="chat" class="chat">
<div class="msg bot-msg">Olá! 👋 Posso gerar código também.</div>
</div>

<div class="input-wrap">
<div class="input-box">
<input id="input" placeholder="Escreve uma mensagem...">
<button id="send" class="send">↑</button>
</div>
</div>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const send=document.getElementById("send");
const counter=document.getElementById("counter");

let messageCount=0;
let isThinking=false;

let conversation=[
{role:"system",content:
"Responde em português. Quando enviares código usa blocos ```linguagem```."}
];

/* contador */
function updateCounter(){
counter.textContent="Mensagens: "+messageCount;
}

/* detectar código */
function formatMessage(text){
const codeRegex=/```(\w+)?\n([\s\S]*?)```/g;

if(!codeRegex.test(text)) return document.createTextNode(text);

const container=document.createElement("div");
let lastIndex=0;
text.replace(codeRegex,(match,lang,code,index)=>{
const before=text.slice(lastIndex,index);
if(before) container.appendChild(document.createTextNode(before));

const block=document.createElement("div");
block.className="code-block";

block.innerHTML=`
<div class="code-header">
<span>${lang||"code"}</span>
<button class="copy-btn">📋 Copiar</button>
</div>
<pre><code>${escapeHtml(code)}</code></pre>
`;

block.querySelector(".copy-btn").onclick=()=>{
navigator.clipboard.writeText(code);
block.querySelector(".copy-btn").textContent="✅ Copiado";
setTimeout(()=>block.querySelector(".copy-btn").textContent="📋 Copiar",1500);
};

container.appendChild(block);
lastIndex=index+match.length;
});

const after=text.slice(lastIndex);
if(after) container.appendChild(document.createTextNode(after));

return container;
}

function escapeHtml(str){
return str.replace(/[&<>"']/g,m=>({
"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
}[m]));
}

/* adicionar mensagem */
function addMessage(text,isUser=false){
const msg=document.createElement("div");
msg.className="msg "+(isUser?"user-msg":"bot-msg");

const content=formatMessage(text);
msg.appendChild(content);

chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;
messageCount++;
updateCounter();
return msg;
}

/* typing */
function showTyping(){
const div=document.createElement("div");
div.className="typing";
div.id="typing";
div.innerHTML=`<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){
document.getElementById("typing")?.remove();
}

/* IA */
async function botReply(userText){
if(isThinking) return;
isThinking=true;
send.disabled=true;

showTyping();
conversation.push({role:"user",content:userText});

try{
const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({messages:conversation})
});

const data=await res.json();
removeTyping();

addMessage(data.reply,false);
conversation.push({role:"assistant",content:data.reply});

}catch{
removeTyping();
addMessage("Erro ao contactar IA.");
}

isThinking=false;
send.disabled=false;
}

/* enviar */
function sendMessage(){
const text=input.value.trim();
if(!text||isThinking) return;

addMessage(text,true);
input.value="";
botReply(text);
}

send.onclick=sendMessage;
input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage();
});

/* extras */
function clearChat(){
chat.innerHTML="";
messageCount=0;
updateCounter();
}

function resetMemory(){
conversation=[
{role:"system",content:
"Responde em português. Quando enviares código usa blocos ```linguagem```."}
];
addMessage("Memória reiniciada.");
}
</script>

</body>
</html>
