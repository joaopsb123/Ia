<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha IA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
background:radial-gradient(circle at top,#161616,#0a0a0a);
color:#ececec;
height:100vh;
overflow:hidden;
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#151515;
border-right:1px solid #2a2a2a;
padding:20px;
display:flex;
flex-direction:column;
}

.user{
margin-top:auto;
display:flex;
gap:10px;
align-items:center;
background:#1f1f1f;
padding:10px;
border-radius:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:linear-gradient(135deg,#6b43a4,#4285f4);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
padding:30px;
overflow:auto;
}

.message{
background:#1f1f1f;
padding:12px 16px;
border-radius:14px;
margin-bottom:10px;
max-width:70%;
}

.user-msg{
background:#4285f4;
align-self:flex-end;
}

/* INPUT */
.input-wrap{
padding:20px;
}

.input-box{
background:#1a1a1a;
border:1px solid #333;
border-radius:30px;
padding:10px 16px;
display:flex;
gap:10px;
}

.input-box input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
font-size:16px;
}

.send{
width:42px;
height:42px;
border-radius:50%;
border:none;
background:white;
cursor:pointer;
font-weight:bold;
}

.send:hover{
background:#34A853;
color:white;
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="user">
<div class="avatar">U</div>
<div>
<div>Utilizador</div>
<div style="font-size:12px;color:#888">Modo local</div>
</div>
</div>
</div>

<div class="main">

<div class="chat" id="chat">
<h2>Sistema pronto 🚀</h2>
</div>

<div class="input-wrap">
<div class="input-box">
<input id="input" placeholder="Escreve uma mensagem...">
<button class="send" id="send">↑</button>
</div>
</div>

</div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

function addMessage(text, isUser=false){
const msg = document.createElement("div");
msg.className = "message" + (isUser ? " user-msg" : "");
msg.innerText = text;
chat.appendChild(msg);
chat.scrollTop = chat.scrollHeight;
}

function botReply(text){
setTimeout(()=>{
addMessage("🤖 " + text);
},600);
}

send.onclick = ()=>{
const text = input.value.trim();
if(!text) return;

addMessage(text,true);
input.value="";

// respostas simples (placeholder)
botReply("Recebi: " + text);
};

input.addEventListener("keypress",e=>{
if(e.key==="Enter") send.click();
});
</script>

</body>
</html>
