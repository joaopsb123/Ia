<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha IA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
background:radial-gradient(circle at top,#151515,#0b0b0b);
color:#ececec;
height:100vh;
overflow:hidden;
display:flex;
}

/* LOGIN */
#login-screen{
position:fixed;
inset:0;
background:#0b0b0b;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
transition:.35s ease;
}

#login-screen.hidden{
opacity:0;
visibility:hidden;
pointer-events:none;
}

.login-box{
background:rgba(30,30,30,.9);
backdrop-filter:blur(12px);
padding:38px;
border-radius:20px;
width:100%;
max-width:380px;
display:flex;
flex-direction:column;
gap:14px;
border:1px solid #2a2a2a;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.login-box h2{
text-align:center;
font-weight:600;
}

.login-box input{
background:#0f0f0f;
border:1px solid #333;
padding:14px;
color:white;
border-radius:10px;
outline:none;
transition:.2s;
}

.login-box input:focus{
border-color:#34A853;
box-shadow:0 0 0 2px rgba(52,168,83,.25);
}

.btn{
padding:14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

.btn-primary{
background:linear-gradient(135deg,#4285f4,#34A853);
color:white;
}

.btn-google{
background:white;
color:black;
}

.btn:hover{
transform:translateY(-2px);
opacity:.95;
}

#login-error{
color:#ff4d4d;
font-size:13px;
text-align:center;
display:none;
}

/* APP */
.app-container{
display:flex;
width:100%;
height:100%;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:rgba(20,20,20,.9);
backdrop-filter:blur(10px);
border-right:1px solid #2a2a2a;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.menu-btn{
background:#1f1f1f;
border:1px solid #333;
color:white;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.menu-btn:hover{
background:#2a2a2a;
transform:translateX(4px);
}

.user-profile{
margin-top:auto;
display:flex;
gap:10px;
align-items:center;
background:#1f1f1f;
padding:10px;
border-radius:10px;
cursor:pointer;
border:1px solid #333;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:linear-gradient(135deg,#6b43a4,#4285f4);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* MAIN */
.main-content{
flex:1;
display:flex;
flex-direction:column;
}

.chat-area{
flex:1;
overflow:auto;
padding:30px;
max-width:900px;
margin:0 auto;
width:100%;
}

/* INPUT */
.input-wrapper{
padding:20px;
max-width:900px;
margin:0 auto;
width:100%;
}

.input-area{
background:#1a1a1a;
border-radius:30px;
padding:10px 18px;
display:flex;
gap:10px;
border:1px solid #333;
transition:.2s;
}

.input-area:focus-within{
border-color:#34A853;
box-shadow:0 0 15px rgba(52,168,83,.25);
}

.input-area input{
flex:1;
background:transparent;
border:none;
color:white;
font-size:16px;
outline:none;
}

.btn-send{
background:white;
border:none;
width:42px;
height:42px;
border-radius:50%;
cursor:pointer;
font-size:18px;
transition:.2s;
}

.btn-send:hover{
background:#34A853;
color:white;
transform:scale(1.05);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
<div class="login-box">
<h2>Minha IA</h2>
<p id="login-error"></p>
<input type="email" id="email" placeholder="O teu E-mail">
<input type="password" id="password" placeholder="A tua Palavra-passe">
<button class="btn btn-primary" id="btn-login-email">Entrar / Registar</button>
<button class="btn btn-google" id="btn-login-google">Google Login</button>
</div>
</div>

<div class="app-container">

<aside class="sidebar">
<button class="menu-btn">💬 Chat</button>

<div class="user-profile" id="btn-logout">
<div class="avatar" id="user-avatar">U</div>
<div>
<div id="user-name">User</div>
<div style="font-size:12px;color:#888">Sair</div>
</div>
</div>
</aside>

<main class="main-content">

<div class="chat-area">
<h2>Sistema pronto 🚀</h2>
</div>

<div class="input-wrapper">
<div class="input-area">
<input id="chat-input" placeholder="Pede-me qualquer coisa...">
<button class="btn-send">↑</button>
</div>
</div>

</main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
getAuth,signInWithRedirect,getRedirectResult,GoogleAuthProvider,
signInWithEmailAndPassword,createUserWithEmailAndPassword,
onAuthStateChanged,signOut
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig={
apiKey:"AIzaSyCrJ47i72d-rPtvOnXc84o0Enp0zkpYv_4",
authDomain:"ia-123-a8ea8.firebaseapp.com",
projectId:"ia-123-a8ea8",
storageBucket:"ia-123-a8ea8.firebasestorage.app",
messagingSenderId:"232554388490",
appId:"1:232554388490:web:2ad57cab51484837f593f3"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

/* ELEMENTOS */
const loginScreen=document.getElementById("login-screen");
const errDiv=document.getElementById("login-error");

const emailInput=document.getElementById("email");
const passwordInput=document.getElementById("password");

const btnEmail=document.getElementById("btn-login-email");
const btnGoogle=document.getElementById("btn-login-google");
const btnLogout=document.getElementById("btn-logout");

/* GOOGLE REDIRECT */
getRedirectResult(auth).catch(e=>{
errDiv.innerHTML="❌ "+e.code;
errDiv.style.display="block";
});

/* OBSERVADOR */
onAuthStateChanged(auth,user=>{
if(user){
loginScreen.classList.add("hidden");
const nome=user.displayName||user.email.split("@")[0];
document.getElementById("user-name").innerText=nome;
document.getElementById("user-avatar").innerText=nome[0].toUpperCase();
}else{
loginScreen.classList.remove("hidden");
}
});

/* LOGIN EMAIL */
btnEmail.onclick=async()=>{
const email=emailInput.value.trim();
const pwd=passwordInput.value.trim();

if(!email||!pwd){
errDiv.innerHTML="⚠️ Preenche tudo";
errDiv.style.display="block";
return;
}

errDiv.style.display="none";

try{
await signInWithEmailAndPassword(auth,email,pwd);
}catch{
try{
await createUserWithEmailAndPassword(auth,email,pwd);
}catch(e){
errDiv.innerHTML="❌ "+e.code;
errDiv.style.display="block";
}
}
};

/* GOOGLE */
btnGoogle.onclick=()=>{
const provider=new GoogleAuthProvider();
signInWithRedirect(auth,provider);
};

/* LOGOUT */
btnLogout.onclick=()=>signOut(auth);
</script>

</body>
</html>
