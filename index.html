<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha IA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
background:radial-gradient(circle at top,#151515,#070707);
color:#ececec;
height:100vh;
display:flex;
overflow:hidden;
}

/* ===== LAYOUT ===== */

.app{display:flex;width:100%;height:100%}

/* ===== SIDEBAR ===== */

.sidebar{
width:270px;
background:#0f0f0f;
border-right:1px solid #242424;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
transition:.25s;
}

.sidebar.collapsed{width:70px}

.logo{
font-size:22px;
font-weight:600;
display:flex;
align-items:center;
gap:8px;
}

.status{
font-size:12px;
color:#4ade80;
}

.side-btn{
background:#1a1a1a;
border:1px solid #2f2f2f;
padding:11px;
border-radius:12px;
cursor:pointer;
transition:.18s;
font-size:14px;
display:flex;
align-items:center;
gap:8px;
}

.side-btn:hover{
background:#262626;
transform:translateX(4px);
}

/* ===== HEADER ===== */

.header{
height:60px;
border-bottom:1px solid #222;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 18px;
background:#0b0b0b;
}

.header-title{
font-weight:600;
}

.header-actions{
display:flex;
gap:8px;
}

.header-btn{
background:#1f1f1f;
border:1px solid #333;
color:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.header-btn:hover{background:#2a2a2a}

/* ===== MAIN ===== */

.main{
flex:1;
display:flex;
flex-direction:column;
height:100%;
}

/* ===== CHAT ===== */

.chat{
flex:1;
padding:22px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:16px;
scroll-behavior:smooth;
}

.message-row{
display:flex;
gap:10px;
max-width:85%;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1;transform:translateY(0)}
}

.message-row.user{align-self:flex-end;flex-direction:row-reverse}
.message-row.bot{align-self:flex-start}

.avatar{
width:34px;
height:34px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
font-weight:bold;
flex-shrink:0;
}

.avatar.user{background:#4285f4}
.avatar.bot{background:#222}

.msg{
padding:14px 18px;
border-radius:18px;
line-height:1.5;
white-space:pre-wrap;
}

.user .msg{
background:#4285f4;
border-bottom-right-radius:6px;
}

.bot .msg{
background:#1b1b1b;
border-bottom-left-radius:6px;
}

/* ===== CODE ===== */

.code-block{
background:#0d0d0d;
border:1px solid #333;
border-radius:12px;
margin-top:10px;
overflow:hidden;
}

.code-header{
display:flex;
justify-content:space-between;
padding:6px 10px;
background:#141414;
font-size:12px;
color:#aaa;
}

.copy-btn{
background:#2a2a2a;
border:none;
color:white;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.copy-btn:hover{background:#3a3a3a}

pre{margin:0;padding:12px;overflow:auto}

/* ===== INPUT ===== */

.input-wrap{
padding:16px;
border-top:1px solid #222;
background:#0b0b0b;
}

.input-box{
background:#151515;
border:1px solid #333;
border-radius:28px;
padding:8px 14px;
display:flex;
gap:10px;
align-items:flex-end;
}

textarea{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
font-size:15px;
resize:none;
max-height:140px;
}

.send{
width:44px;
height:44px;
border-radius:50%;
border:none;
background:white;
cursor:pointer;
font-weight:bold;
}

.send:disabled{opacity:.5;cursor:not-allowed}

.typing{
font-size:12px;
color:#aaa;
padding-left:6px;
}

/* MOBILE */

@media(max-width:768px){
.sidebar{display:none}
.message-row{max-width:95%}
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="logo">🤖 Minha IA</div>
<div class="status">● Online</div>

<button class="side-btn" onclick="clearChat()">🧹 Limpar chat</button>
<button class="side-btn" onclick="resetMemory()">🧠 Reset memória</button>
<button class="side-btn" onclick="exportChat()">📁 Exportar chat</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<div class="header-title">Assistente IA</div>
<div class="header-actions">
<button class="header-btn" onclick="toggleSidebar()">☰</button>
<button class="header-btn" onclick="stopGeneration()">⛔ Parar</button>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-wrap">
<div class="input-box">
<textarea id="input" rows="1" placeholder="Escreve uma mensagem..."></textarea>
<button id="send" class="send">↑</button>
</div>
<div id="typingLabel" class="typing"></div>
</div>

</div>
</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("input");
const send=document.getElementById("send");
const typingLabel=document.getElementById("typingLabel");

let isThinking=false;
let stopFlag=false;

let conversation=[
{role:"system",content:"Responde em português. Usa blocos ``` para código."}
];

/* ===== UTIL ===== */

function autoResize(){
input.style.height="auto";
input.style.height=input.scrollHeight+"px";
}
input.addEventListener("input",autoResize);

/* ===== MESSAGE ===== */

function createMessage(text,isUser=false){
const row=document.createElement("div");
row.className="message-row "+(isUser?"user":"bot");

const avatar=document.createElement("div");
avatar.className="avatar "+(isUser?"user":"bot");
avatar.textContent=isUser?"U":"IA";

const msg=document.createElement("div");
msg.className="msg";

msg.appendChild(formatMessage(text));

row.appendChild(avatar);
row.appendChild(msg);

chat.appendChild(row);
chat.scrollTop=chat.scrollHeight;

return msg;
}

/* ===== CODE FORMAT ===== */

function formatMessage(text){
const codeRegex=/```(\w+)?\n([\s\S]*?)```/g;

if(!codeRegex.test(text)) return document.createTextNode(text);

const container=document.createElement("div");
let lastIndex=0;

text.replace(codeRegex,(match,lang,code,index)=>{
const before=text.slice(lastIndex,index);
if(before) container.appendChild(document.createTextNode(before));

const block=document.createElement("div");
block.className="code-block";

block.innerHTML=`
<div class="code-header">
<span>${lang||"code"}</span>
<button class="copy-btn">📋 Copiar</button>
</div>
<pre><code>${escapeHtml(code)}</code></pre>
`;

block.querySelector(".copy-btn").onclick=()=>{
navigator.clipboard.writeText(code);
block.querySelector(".copy-btn").textContent="✅ Copiado";
setTimeout(()=>block.querySelector(".copy-btn").textContent="📋 Copiar",1500);
};

container.appendChild(block);
lastIndex=index+match.length;
});

const after=text.slice(lastIndex);
if(after) container.appendChild(document.createTextNode(after));

return container;
}

function escapeHtml(str){
return str.replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));
}

/* ===== IA ===== */

async function botReply(userText){
if(isThinking) return;
isThinking=true;
stopFlag=false;
send.disabled=true;
typingLabel.textContent="IA a pensar...";

conversation.push({role:"user",content:userText});

try{
const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({messages:conversation})
});

const data=await res.json();
typingLabel.textContent="";

const msgEl=createMessage("",false);
await typeWriter(msgEl,data.reply);

conversation.push({role:"assistant",content:data.reply});

}catch{
typingLabel.textContent="";
createMessage("Erro ao contactar IA.",false);
}

isThinking=false;
send.disabled=false;
}

/* ===== TYPEWRITER ===== */

async function typeWriter(el,text){
el.textContent="";
for(let i=0;i<text.length;i++){
if(stopFlag) break;
el.textContent+=text[i];
chat.scrollTop=chat.scrollHeight;
await new Promise(r=>setTimeout(r,8));
}
}

/* ===== SEND ===== */

function sendMessage(){
const text=input.value.trim();
if(!text||isThinking) return;

createMessage(text,true);
input.value="";
autoResize();
botReply(text);
}

send.onclick=sendMessage;

input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();
sendMessage();
}
});

/* ===== EXTRA ===== */

function clearChat(){chat.innerHTML=""}
function resetMemory(){
conversation=[{role:"system",content:"Responde em português. Usa blocos ``` para código."}]
createMessage("Memória reiniciada.",false);
}
function exportChat(){
const text=chat.innerText;
navigator.clipboard.writeText(text);
alert("Chat copiado!");
}
function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("collapsed");
}
function stopGeneration(){stopFlag=true}
</script>

</body>
</html>
