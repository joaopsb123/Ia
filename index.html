<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha IA Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #0f0f0f; color: #ececec; height: 100vh; overflow: hidden; display: flex; }
        
        /* LAYOUT PRINCIPAL (PC e Mobile) */
        .app-container { display: flex; width: 100%; height: 100%; }
        
        /* SIDEBAR (Menu Lateral) */
        .sidebar { width: 260px; background: #171717; padding: 20px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #2a2a2a; transition: 0.3s; z-index: 10; }
        .sidebar h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #fff; }
        .menu-btn { background: #212121; color: white; border: 1px solid #333; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; }
        .menu-btn:hover { background: #2a2a2a; }
        .menu-btn.active { background: #4285f4; border-color: #4285f4; }
        .user-profile { margin-top: auto; display: flex; align-items: center; gap: 10px; background: #212121; padding: 10px; border-radius: 8px; cursor: pointer; }
        .avatar { width: 35px; height: 35px; background: #6b43a4; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        
        /* ÁREA PRINCIPAL */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* TELAS */
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; overflow-y: auto; }
        .screen.active-screen { display: flex; }

        /* HEADER MOBILE */
        .mobile-header { display: none; padding: 15px 20px; background: #0f0f0f; border-bottom: 1px solid #2a2a2a; align-items: center; justify-content: space-between; }
        .hamburger { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        /* TELA DE LOGIN */
        #login-screen { justify-content: center; align-items: center; position: absolute; top: 0; left: 0; width: 100%; z-index: 50; background: #0f0f0f; }
        .login-box { background: #171717; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #2a2a2a; }
        .login-box input { background: #0f0f0f; border: 1px solid #333; padding: 14px; color: white; border-radius: 8px; font-size: 15px; }
        .btn { padding: 14px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: #4285f4; color: white; }
        .btn-google { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #login-error { color: #ff4d4d; font-size: 13px; text-align: center; display: none; }

        /* CHAT AREA */
        .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .greeting { font-size: 36px; font-weight: 500; margin-top: 15vh; line-height: 1.2; text-align: center; background: -webkit-linear-gradient(#fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .message { padding: 14px 18px; border-radius: 16px; max-width: 85%; line-height: 1.5; font-size: 15px; animation: fadeIn 0.3s ease; }
        .user-msg { background: #212121; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: transparent; align-self: flex-start; display: flex; gap: 10px; }
        .ai-icon { font-size: 20px; }
        
        /* INPUT AREA */
        .input-wrapper { padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .input-area { background: #212121; border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #333; transition: 0.3s; }
        .input-area:focus-within { border-color: #555; background: #2a2a2a; }
        .input-area input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
        .input-area button { background: none; border: none; color: #a8a8a8; font-size: 20px; cursor: pointer; }
        .btn-send { background: #fff !important; color: #000 !important; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* ENSINAR AREA */
        .teach-form { max-width: 600px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 15px; background: #171717; padding: 25px; border-radius: 16px; border: 1px solid #2a2a2a; }
        .teach-form label { font-size: 13px; color: #a8a8a8; text-transform: uppercase; letter-spacing: 1px; }
        .teach-form input, .teach-form textarea { background: #0f0f0f; border: 1px solid #333; padding: 14px; color: white; border-radius: 8px; font-size: 15px; resize: vertical; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* RESPONSIVO MOBILE */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -100%; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            .mobile-header { display: flex; }
            .greeting { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="login-box">
            <h2 style="text-align: center;">Minha IA</h2>
            <p id="login-error"></p>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Palavra-passe">
            <button class="btn btn-primary" id="btn-login-email">Entrar / Registar</button>
            <div style="text-align: center; color: #666; font-size: 14px;">ou</div>
            <button class="btn btn-google" id="btn-login-google">
                <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Entrar com Google
            </button>
        </div>
    </div>

    <div class="app-container">
        
        <aside class="sidebar" id="sidebar">
            <h2>Gestão da IA</h2>
            <button class="menu-btn active" onclick="switchTab('chat')">💬 Conversar</button>
            <button class="menu-btn" onclick="switchTab('teach')">🧠 Ensinar IA</button>
            <button class="menu-btn" onclick="switchTab('bulk')">📚 Aprender Rápido (Textão)</button>
            
            <div class="user-profile" id="btn-logout">
                <div class="avatar" id="user-avatar">U</div>
                <div>
                    <div style="font-size: 14px; color: white;" id="user-name">User</div>
                    <div style="font-size: 12px; color: #888;">Terminar Sessão</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            
            <div class="mobile-header">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <h1 style="font-size: 18px; font-weight: 500;">Minha IA</h1>
                <div style="width: 24px;"></div>
            </div>

            <div id="tab-chat" class="screen active-screen">
                <div class="chat-area" id="chat-area">
                    <div class="greeting" id="greeting-box">
                        Olá <br> Por onde começamos?
                    </div>
                </div>

                <div class="input-wrapper">
                    <div class="input-area">
                        <input type="text" id="chat-input" placeholder="Escreve a tua mensagem aqui...">
                        <button class="btn-send" id="btn-send">➤</button>
                    </div>
                </div>
            </div>

            <div id="tab-teach" class="screen">
                <div class="teach-form">
                    <h2>Ensinar nova frase</h2>
                    <p style="color: #888; font-size: 14px;">Agora a IA é inteligente. Não precisas de escrever a frase exata. Ela vai procurar pelas palavras-chave!</p>
                    <label>Assunto / Palavras-chave (Ex: criar universo):</label>
                    <input type="text" id="teach-trigger" placeholder="O que o utilizador vai perguntar?">
                    <label>A IA deve responder:</label>
                    <textarea id="teach-response" rows="3" placeholder="A resposta detalhada da IA..."></textarea>
                    <button class="btn btn-primary" id="btn-save-teach">Memorizar</button>
                </div>
            </div>

            <div id="tab-bulk" class="screen">
                <div class="teach-form">
                    <h2>Upload de Conhecimento</h2>
                    <p style="color: #888; font-size: 14px;">Cola várias frases. Formato obrigatório: <b>pergunta = resposta</b></p>
                    <textarea id="teach-bulk" rows="8" placeholder="criador = Fui criada por ti&#10;quem ganhou o mundial = A Argentina ganhou em 2022"></textarea>
                    <button class="btn" style="background: #34A853; color: white;" id="btn-save-bulk">Processar Textão</button>
                </div>
            </div>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrJ47i72d-rPtvOnXc84o0Enp0zkpYv_4",
            authDomain: "ia-123-a8ea8.firebaseapp.com",
            projectId: "ia-123-a8ea8",
            storageBucket: "ia-123-a8ea8.firebasestorage.app",
            messagingSenderId: "232554388490",
            appId: "1:232554388490:web:2ad57cab51484837f593f3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CONTROLO DE UI E MENUS
        window.toggleSidebar = function() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        window.switchTab = function(tabName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            
            if(tabName !== 'login') {
                document.getElementById('tab-' + tabName).classList.add('active-screen');
                event.target.classList.add('active');
                if(window.innerWidth <= 768) toggleSidebar(); // Fecha menu no mobile ao clicar
            } else {
                document.getElementById('login-screen').classList.add('active-screen');
            }
        }

        // AUTENTICAÇÃO
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.remove('active-screen');
                document.getElementById('tab-chat').classList.add('active-screen');
                let nome = user.displayName || user.email.split('@')[0];
                document.getElementById('user-name').innerText = nome;
                document.getElementById('user-avatar').innerText = nome.charAt(0).toUpperCase();
            } else {
                window.switchTab('login');
            }
        });

        const errorDiv = document.getElementById('login-error');

        document.getElementById('btn-login-email').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            errorDiv.style.display = 'none';
            try { await signInWithEmailAndPassword(auth, email, password); } 
            catch {
                try { await createUserWithEmailAndPassword(auth, email, password); } 
                catch (err) { errorDiv.innerText = err.message; errorDiv.style.display = 'block'; }
            }
        };

        document.getElementById('btn-login-google').onclick = async () => {
            errorDiv.style.display = 'none';
            try { 
                await signInWithPopup(auth, new GoogleAuthProvider()); 
            } catch (error) { 
                // MOSTRA O ERRO EXATO DO GOOGLE PARA SABERMOS O QUE FALHOU
                errorDiv.innerHTML = `Erro Google: <b>${error.code}</b><br>Se o erro for 'unauthorized-domain', tens de adicionar o link do teu Vercel no Firebase em Authentication > Settings > Authorized domains.`; 
                errorDiv.style.display = 'block'; 
            }
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // SALVAR DADOS
        document.getElementById('btn-save-teach').onclick = async () => {
            const trigger = document.getElementById('teach-trigger').value.trim();
            const response = document.getElementById('teach-response').value.trim();
            if (!trigger || !response) return alert("Preenche tudo!");
            try {
                await addDoc(collection(db, "ia_brain"), { trigger, response });
                document.getElementById('teach-trigger').value = '';
                document.getElementById('teach-response').value = '';
                alert("Memorizado!");
            } catch (err) { alert(err.message); }
        };

        document.getElementById('btn-save-bulk').onclick = async () => {
            const text = document.getElementById('teach-bulk').value;
            const lines = text.split('\n');
            let count = 0;
            document.getElementById('btn-save-bulk').innerText = "A guardar...";
            for (let line of lines) {
                if (line.includes('=')) {
                    let parts = line.split('=');
                    if (parts[0].trim() && parts[1].trim()) {
                        await addDoc(collection(db, "ia_brain"), { trigger: parts[0].trim(), response: parts[1].trim() });
                        count++;
                    }
                }
            }
            document.getElementById('btn-save-bulk').innerText = "Processar Textão";
            document.getElementById('teach-bulk').value = '';
            alert(`Foram adicionadas ${count} novas memórias!`);
        };

        // ====== O NOVO CÉREBRO INTELIGENTE DA IA ======
        
        // Função para limpar palavras (tira acentos e pontuação)
        function cleanText(text) {
            return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[?!,.]/g, "").toLowerCase();
        }

        async function sendMessage() {
            const chatInput = document.getElementById('chat-input');
            const chatArea = document.getElementById('chat-area');
            const text = chatInput.value.trim();
            if (!text) return;

            document.getElementById('greeting-box').style.display = 'none';
            chatArea.innerHTML += `<div class="message user-msg">${text}</div>`;
            chatInput.value = '';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                // 1. Limpar e dividir a frase do utilizador em palavras
                const userWords = cleanText(text).split(/\s+/);
                
                // 2. Ir buscar TUDO o que ela sabe ao Firebase
                const querySnapshot = await getDocs(collection(db, "ia_brain"));
                
                let bestMatchResponse = "Ainda não fui treinada para entender isso. Podes usar a aba lateral para me ensinar!";
                let highestScore = 0;

                // 3. O Algoritmo de Inteligência: Comparar palavras
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const triggerWords = cleanText(data.trigger).split(/\s+/);
                    
                    let matchCount = 0;
                    
                    // Verifica quantas palavras do trigger o utilizador escreveu
                    triggerWords.forEach(word => {
                        // Só conta palavras maiores que 2 letras (ignora "o", "a", "de")
                        if (word.length > 2 && userWords.includes(word)) {
                            matchCount++;
                        }
                    });

                    // Calcula a percentagem de compatibilidade
                    let score = matchCount / triggerWords.length;

                    // Se a frase ensinada tinha só 1 palavra (ex: "olá"), e coincidiu, o score é 1 (100%)
                    if (score > highestScore && score >= 0.4) { // Precisa de pelo menos 40% de acerto
                        highestScore = score;
                        bestMatchResponse = data.response;
                    }
                });

                // Simular "A Pensar..."
                const idDiv = "msg-" + Date.now();
                chatArea.innerHTML += `<div class="message ai-msg" id="${idDiv}"><span class="ai-icon">✨</span><span class="text">A pensar...</span></div>`;
                chatArea.scrollTop = chatArea.scrollHeight;

                setTimeout(() => {
                    document.querySelector(`#${idDiv} .text`).innerHTML = bestMatchResponse;
                    chatArea.scrollTop = chatArea.scrollHeight;
                }, 800);

            } catch (error) {
                console.error(error);
                chatArea.innerHTML += `<div class="message ai-msg">Erro: Falha na conexão com a memória.</div>`;
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('btn-send').onclick = sendMessage;

    </script>
</body>
    </html>
