<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente IA</title>

<link rel="manifest" href="/manifest.json">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui}

body{
background:#0b0b0b;
color:#fff;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
height:56px;
background:#111;
border-bottom:1px solid #222;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 14px;
font-weight:600;
}

.header-buttons button{
margin-left:6px;
}

/* CHAT */
.chat{
flex:1;
overflow:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:14px;
scroll-behavior:smooth;
}

.msg{
max-width:85%;
padding:12px 16px;
border-radius:16px;
white-space:pre-wrap;
line-height:1.5;
}

.user{align-self:flex-end;background:#2563eb}
.bot{align-self:flex-start;background:#1a1a1a}

/* INPUT */
.input-wrap{
border-top:1px solid #222;
padding:10px;
display:flex;
gap:8px;
background:#111;
}

textarea{
flex:1;
resize:none;
background:#1a1a1a;
border:1px solid #333;
border-radius:12px;
padding:10px;
color:#fff;
font-size:16px;
}

button{
background:#22c55e;
border:none;
color:white;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

/* MOBILE */
@media(min-width:768px){
.chat{padding:24px}
}
</style>
</head>

<body>

<div class="header">
🤖 Assistente IA
<div class="header-buttons">
<button onclick="startVoice()">🎤</button>
<button onclick="speakLast()">🔊</button>
</div>
</div>

<div id="chat" class="chat"></div>

<div class="input-wrap">
<textarea id="input" rows="1" placeholder="Escreve uma mensagem..."></textarea>
<button id="sendBtn" onclick="sendMessage()">Enviar</button>
<button onclick="uploadImage()">📷</button>
</div>

<input type="file" id="imgInput" hidden accept="image/*">

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

let conversation = [
  { role:"system", content:"Responde em português de forma amigável." }
];

/* ================= MENSAGENS ================= */

function addMsg(text,cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
  return d;
}

/* ================= STREAM REAL ================= */

async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;

  sendBtn.disabled = true;

  addMsg(text,"user");
  input.value="";

  const botEl=addMsg("","bot");

  conversation.push({role:"user",content:text});

  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:conversation})
    });

    if(!res.body){
      botEl.textContent="Erro na IA.";
      sendBtn.disabled = false;
      return;
    }

    const reader=res.body.getReader();
    const decoder=new TextDecoder();

    let buffer="";

    while(true){
      const {done,value}=await reader.read();
      if(done) break;

      buffer += decoder.decode(value,{stream:true});

      const parts = buffer.split("\n");
      buffer = parts.pop();

      for(const part of parts){
        const line = part.trim();
        if(!line.startsWith("data:")) continue;

        const jsonStr = line.replace("data:","").trim();
        if(jsonStr === "[DONE]") continue;

        try{
          const data = JSON.parse(jsonStr);
          const token = data.choices?.[0]?.delta?.content;
          if(token){
            botEl.textContent += token;
            chat.scrollTop = chat.scrollHeight;
          }
        }catch{}
      }
    }

    conversation.push({
      role:"assistant",
      content:botEl.textContent
    });

  }catch(err){
    botEl.textContent="Erro ao contactar IA.";
  }

  sendBtn.disabled = false;
}

/* ================= VOZ OUVIR ================= */

function startVoice(){
  const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="pt-PT";

  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
  };

  rec.start();
}

/* ================= VOZ FALAR ================= */

function speakLast(){
  const text=chat.lastChild?.textContent;
  if(!text) return;

  speechSynthesis.cancel();
  const ut=new SpeechSynthesisUtterance(text);
  ut.lang="pt-PT";
  speechSynthesis.speak(ut);
}

/* ================= UPLOAD IMAGEM ================= */

function uploadImage(){
  document.getElementById("imgInput").click();
}

document.getElementById("imgInput").onchange=e=>{
  const file=e.target.files[0];
  if(!file) return;

  addMsg("📷 Imagem enviada: "+file.name,"user");
};

/* ================= PWA ================= */

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/sw.js");
}
</script>

</body>
</html>
