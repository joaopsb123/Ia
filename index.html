<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha IA</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
background:radial-gradient(circle at top,#161616,#0a0a0a);
color:#ececec;
height:100vh;
display:flex;
}

/* LAYOUT */
.app{
display:flex;
width:100%;
height:100%;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#151515;
border-right:1px solid #2a2a2a;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-weight:600;
font-size:20px;
margin-bottom:20px;
}

.user{
margin-top:auto;
display:flex;
gap:10px;
align-items:center;
background:#1f1f1f;
padding:10px;
border-radius:12px;
}

.avatar{
width:36px;
height:36px;
border-radius:50%;
background:linear-gradient(135deg,#6b43a4,#4285f4);
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
height:100%;
}

/* CHAT */
.chat{
flex:1;
padding:24px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
scroll-behavior:smooth;
}

.msg{
max-width:75%;
padding:12px 16px;
border-radius:16px;
line-height:1.4;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px)}
to{opacity:1;transform:translateY(0)}
}

.user-msg{
align-self:flex-end;
background:#4285f4;
color:white;
border-bottom-right-radius:6px;
}

.bot-msg{
align-self:flex-start;
background:#1f1f1f;
border-bottom-left-radius:6px;
}

/* TYPING */
.typing{
display:flex;
gap:6px;
padding:10px 14px;
background:#1f1f1f;
border-radius:14px;
width:fit-content;
}

.dot{
width:6px;
height:6px;
background:#aaa;
border-radius:50%;
animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
0%,80%,100%{opacity:.3}
40%{opacity:1}
}

/* INPUT */
.input-wrap{
padding:18px;
border-top:1px solid #2a2a2a;
}

.input-box{
background:#1a1a1a;
border:1px solid #333;
border-radius:30px;
padding:10px 16px;
display:flex;
gap:10px;
}

.input-box input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
font-size:16px;
}

.send{
width:42px;
height:42px;
border-radius:50%;
border:none;
background:white;
cursor:pointer;
font-weight:bold;
transition:.15s;
}

.send:hover{
background:#34A853;
color:white;
transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){
.sidebar{display:none}
.msg{max-width:90%}
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">🤖 Minha IA</div>

<div class="user">
<div class="avatar">U</div>
<div>
<div>Modo IA</div>
<div style="font-size:12px;color:#888">Online</div>
</div>
</div>
</div>

<div class="main">

<div id="chat" class="chat">
<div class="msg bot-msg">Olá! 👋 Como posso ajudar?</div>
</div>

<div class="input-wrap">
<div class="input-box">
<input id="input" placeholder="Escreve uma mensagem...">
<button id="send" class="send">↑</button>
</div>
</div>

</div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

/* adicionar mensagem */
function addMessage(text, isUser=false){
  const msg = document.createElement("div");
  msg.className = "msg " + (isUser ? "user-msg" : "bot-msg");
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

/* typing animation */
function showTyping(){
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typing";

  div.innerHTML = `
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById("typing");
  if(t) t.remove();
}

/* IA REAL */
async function botReply(text){
  showTyping();

  try{
    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message:text })
    });

    const data = await res.json();
    removeTyping();
    addMessage(data.reply);

  }catch{
    removeTyping();
    addMessage("Erro ao contactar IA.");
  }
}

/* enviar */
function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,true);
  input.value="";
  botReply(text);
}

send.onclick = sendMessage;
input.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});
</script>

</body>
</html>
